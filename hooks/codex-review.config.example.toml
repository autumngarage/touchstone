# .codex-review.toml — per-project configuration for the AI review hook.
#
# Place this file at the repo root. The hook reads it automatically.
# If this file is missing, the hook uses conservative defaults (all paths unsafe).

[codex_review]
# Maximum iterations of the review → fix → re-review loop.
# After this many rounds without converging on CLEAN, the push aborts.
max_iterations = 3

# Maximum diff size (in lines) before the hook skips review entirely.
# Very large diffs take too long and produce noisy reviews.
max_diff_lines = 5000

# Cache exact-input CODEX_REVIEW_CLEAN results locally under .git/.
# This skips repeated reviewer calls when you push the same branch diff again.
# Set CODEX_REVIEW_DISABLE_CACHE=1 to force a fresh review for one push.
cache_clean_reviews = true

# Default auto-fix policy for paths not listed in unsafe_paths.
#   true  = the reviewer may auto-fix issues in any path not explicitly listed as unsafe
#   false = the reviewer will NOT auto-fix anything unless you add safe path logic (conservative)
#
# For new projects, start with false and gradually opt in as you gain confidence.
safe_by_default = false

# Review mode — controls what the reviewer is allowed to do.
# Enforced at the wrapper level (tool restrictions, sandboxes), not just in the prompt.
#   "fix"         — full access: read, run commands, edit files, commit fixes (default)
#   "review-only" — read + run commands, no file edits or commits
#   "diff-only"   — read-only: no commands, no edits
#   "no-tests"    — read + edit + commit, no command execution (skip test runs)
#
# Override for a single run with: CODEX_REVIEW_MODE=review-only git push
# mode = "fix"

# Wall-clock timeout per reviewer invocation, in seconds. 0 = no timeout.
# If the reviewer doesn't finish in time, the hook exits per on_error policy.
# timeout = 300

# What to do when the reviewer fails (crash, timeout, malformed output).
# "fail-open"   = exit 0, allow push (default — infrastructure errors don't block)
# "fail-closed" = exit 1, block push (use in CI or for strict review gates)
# on_error = "fail-open"

# Paths where the reviewer must NEVER auto-fix — it reports findings but does not edit.
# Use these for high-scrutiny areas where auto-fixes could cause damage.
# Paths are matched as prefixes (e.g., "src/auth/" matches "src/auth/login.py").
unsafe_paths = [
  # "src/auth/",
  # "src/payments/",
  # "migrations/",
  # "src/core/config.py",
]

# --------------------------------------------------------------------------
# Reviewer (Touchstone 2.0+)
# --------------------------------------------------------------------------
# Touchstone 2.0 ships a single reviewer: `conductor`, which wraps the
# `conductor` CLI (autumn-garage/conductor). Conductor owns per-provider
# model selection, auth, tool-access translation, route logging, and cost
# reporting. Touchstone tells it *what it needs*; Conductor picks *how*.
#
# For a fresh project, `reviewer = "conductor"` is the whole story.

# [review]
# enabled = true
# # reviewer = "conductor"   # single-valued in 2.0+; absent reviewers[]

# --------------------------------------------------------------------------
# Conductor routing (optional)
# --------------------------------------------------------------------------
# Fine-tune what Conductor picks and how hard it thinks. All four knobs have
# sensible defaults for code review; only override when you need to.

# [review.conductor]
# # Which provider wins auto-routing. One of:
# #   "best"     — highest-quality-tier (frontier > strong > standard > local)
# #   "cheapest" — minimize $/tok (good for throwaway branches)
# #   "fastest"  — minimize p50 latency
# #   "balanced" — pure tag-overlap (Conductor v0.1 behavior)
# # prefer = "best"
#
# # How hard the chosen provider thinks before answering.
# # Symbolic: "minimal" | "low" | "medium" | "high" | "max"
# # Or an explicit integer thinking-token budget.
# # effort = "max"
#
# # Capability tags passed to the router. Defaults cover code review well.
# # tags = "code-review"
#
# # Pin a specific provider (bypasses auto-routing). Rarely needed.
# # with = "claude"
#
# # Exclude providers from auto-routing (degraded, rate-limited, too expensive).
# # exclude = "gemini"

# --------------------------------------------------------------------------
# Routing by diff size (optional)
# --------------------------------------------------------------------------
# Use this when you want cheap + shallow review for tiny diffs and max-effort
# on large or risky changes. Touchstone-side override of Conductor's knobs
# per size bucket.
#
# Routing uses a single cutoff (small_max_diff_lines): diffs at or below it
# go through the small_* bucket, everything above through the large_* bucket.
# There is no separate large_max_diff_lines — setting one would be silently
# ignored by the parser.
#
# [review.routing]
# enabled = false
# small_max_diff_lines = 400
# small_prefer = "cheapest"
# small_effort = "minimal"
# small_with = "ollama"
# large_prefer = "best"
# large_effort = "max"
# large_tags = "code-review,long-context"

# --------------------------------------------------------------------------
# Peer review — DISABLED IN 2.0.0
# --------------------------------------------------------------------------
# [review.assist] (second-opinion from a different model) is disabled in
# Touchstone 2.0.0. It returns in v2.1 via `conductor call --exclude <primary>`
# — once Conductor exposes a clean way to extract the primary's provider.
# Until then, if `[review.assist].enabled = true` is set, Touchstone warns
# and ignores the setting.

# --------------------------------------------------------------------------
# Repo-provided review context (optional)
# --------------------------------------------------------------------------
# Place a .codex-review-context.md at the repo root (or .github/) to provide
# additional context to the reviewer. This is appended to the prompt automatically.
#
# Example content:
#   - "CI already runs linting and type-checking; do not re-run them."
#   - "The payments module is being migrated; ignore legacy patterns in src/payments/."
#
# File search order:
#   1. .codex-review-context.md
#   2. .github/codex-review-context.md
