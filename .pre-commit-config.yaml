# Pre-commit hooks for the Touchstone itself (dogfooding).
# Install: pre-commit install --install-hooks

repos:
  # Standard hooks
  #
  # Cortex append-only exclusions: `.cortex/journal/` is append-only and
  # `.cortex/doctrine/` is immutable-with-supersede. Auto-fixing trailing
  # whitespace or final newlines in those files violates the Cortex Protocol
  # (§4.1, §4.2) — the entries' content must not change after original write.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^\.cortex/(journal|doctrine)/
      - id: end-of-file-fixer
        exclude: ^\.cortex/(journal|doctrine)/
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'master']
        stages: [pre-commit]

  # Run the same shellcheck-py the downstream `templates/pre-commit-config.yaml`
  # pins, so any warning that would block a fresh scaffold's first push also
  # blocks ours. This closes the gap that bit us when sentinel's
  # `touchstone update --ship` hit SC2120 in a script touchstone had just
  # synced — touchstone's own tests use system shellcheck (a different
  # version) and silently passed. completions/ and prototypes/ aren't shipped
  # to downstream, so they're excluded from this hook (zsh syntax, prototype
  # color constants).
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ['--severity=warning']
        exclude: ^(completions/|prototypes/)

  # Codex review for direct pushes to the default branch
  - repo: local
    hooks:
      - id: codex-review
        name: Codex default-branch push review
        entry: /usr/bin/env bash hooks/codex-review.sh
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

  # Self-tests via the same touchstone-run.sh validate path downstream projects
  # use. Touchstone's .touchstone-config sets validate_command to loop through
  # tests/test-*.sh — this means any change to the validate dispatcher that
  # breaks the downstream flow also breaks Touchstone's own pre-push, so the
  # dogfood discipline catches regressions the templates would otherwise hide.
  - repo: local
    hooks:
      - id: touchstone-validate
        name: Touchstone project validation
        entry: /usr/bin/env bash scripts/touchstone-run.sh validate
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false
