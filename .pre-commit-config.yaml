# Pre-commit hooks for the toolkit itself (dogfooding).
# Install: pre-commit install --install-hooks

repos:
  # Standard hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'master']

  # Codex pre-push review (the toolkit reviews itself)
  - repo: local
    hooks:
      - id: codex-review
        name: Codex pre-push review
        entry: bash hooks/codex-review.sh
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

  # Self-tests (run on pre-push alongside Codex review)
  - repo: local
    hooks:
      - id: self-tests
        name: Toolkit self-tests
        entry: bash -c 'bash tests/test-bootstrap.sh && bash tests/test-update.sh'
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false
